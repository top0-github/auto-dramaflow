name: 代码检查

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: TypeScript 编译检查

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装依赖
        run: yarn install --frozen-lockfile

      - name: TypeScript 类型检查
        run: yarn lint
